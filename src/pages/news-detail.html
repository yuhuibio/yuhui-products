{id:2,img:"https://picsum.photos/id/1012/600/400",title:"Leading the Way: Our Company Recognized as Key Supplier of Clove Leaf Oil",date:"2024-04-17",desc:"Our stable supply chain gains wide industry recognition.",content:"In recent industry surveys, our company has been recognized as a primary provider of high-quality Clove Leaf Oil, showcasing our commitment to excellence in the essential oils market. This recognition highlights not only our expertise but also the trust our clients and partners place in us.\n\nClove leaf oil, renowned for its aromatic and therapeutic properties, is widely used across industries including aromatherapy, cosmetics, and pharmaceuticals. As a leading supplier, we pride ourselves on delivering top-grade Clove Leaf Oil that meets and exceeds industry standards, ensuring efficacy and purity for our customers.\n\nAs demand for natural, eco-conscious products continues to rise, Clove Leaf Oil remains a versatile, sought-after ingredient. Whether for its antibacterial properties, soothing aroma, or holistic benefits, our oil caters to a wide range of applications, driving growth and opportunities for our partners.\n\nLooking ahead, we remain committed to upholding our reputation as a trusted supplier of Clove Leaf Oil, empowering businesses and consumers alike with quality solutions that inspire wellness and prosperity.\n\nFor inquiries or to experience the benefits of our Clove Leaf Oil firsthand, contact us today."},
{id:3,img:"https://picsum.photos/id/1013/600/400",title:"Our Plant Extract Liquids Reach Australian Markets",date:"2023-09-14",desc:"Our plant extract liquids pass local safety certification.",content:"We are excited to announce that our company has successfully exported a significant shipment of plant extract liquids to the Australian market. This expansion into Australia marks a significant milestone in our ongoing commitment to providing high-quality botanical extracts to a global customer base.\n\n\nOur plant extract liquids, derived from a diverse range of plants known for their health and wellness benefits, have been well-received by consumers and businesses alike in Australia. With a focus on quality, sustainability, and innovation, our products have quickly gained traction in the Australian market.\n\n\nThe Australian market's demand for natural and organic products aligns perfectly with our mission to deliver premium plant extracts. These extracts are used in various applications, including health supplements, cosmetics, food and beverages, and pharmaceuticals. We believe that our products will not only meet but exceed the expectations of Australian consumers and businesses.Our company remains committed to fostering strong relationships with our Australian partners and customers. We look forward to working closely with local distributors, manufacturers, and retailers to ensure that our plant extract liquids are readily available to Australians seeking high-quality, plant-based solutions.\n\n\nFor more information about our plant extract liquids or to inquire about distribution opportunities in Australia, please do not hesitate to contact us. We are excited about the growth of our brand in Australia and are dedicated to delivering the benefits of nature to the Australian market."},
{id:4,img:"https://picsum.photos/id/1014/600/400",title:"We received Positive Feedback From Global Buyers",date:"2024-03-02",desc:"Long-term cooperation feedback and repeat orders keep growing.",content:"XIAN YUHUI BIOTECHNOLOGY CO.,LTD has recently received a high volume of positive feedback from our customers, praising the quality and benefits of our products.\n\n\nThe customers have reported noticeable improvements in their overall health and well-being after incorporating the essential oils into their daily routines. Some have used the oils for aromatherapy purposes, while others have applied them topically for specific health issues such as headaches, joint pain and skin irritation.\n\n\nThe customers have also praised the company for their exceptional customer service and support, as well as their commitment to using only natural, high-quality ingredients in their products.\n\n\nThe owner of our company expressed her gratitude for the feedback, stating, \"We are so pleased to hear from our customers about the positive impact our essential oils have had on their lives. It is a true testament to the power of nature and the commitment we have to providing the best products possible.\"\n\n\nThis news is a clear indication of the increasing popularity and effectiveness of natural health solutions, and we are poised to continue its growth and success in the market."},
{id:5,img:"https://picsum.photos/id/1015/600/400",title:"XIAN YUHUI BIOTEC Exports Rosehip Oil to Australia",date:"2024-01-20",desc:"Large batch cold-pressed rosehip oil delivered to Australia warehouse.",content:"[Xi'an， China] – [XIAN YUHUI BIOTECHNOLOGY CO.,LTD], a leading producer of natural skincare products, announces its successful export of rosehip oil to Australia. The company's signature product, rosehip oil, has gained popularity among skincare enthusiasts and is known for its nourishing and rejuvenating properties.\n\n\nThe company's rosehip oil is derived from the seeds of the rose hip, a fruit that grows on wild roses. The oil is rich in antioxidants, vitamins, and essential fatty acids that help hydrate, brighten and regenerate the skin. The product has been carefully crafted to meet international standards of quality and sustainability.\n\n\n\"We are thrilled to expand our reach to Australia,\" said Mr Lau, \"We have received tremendous feedback from customers in Australia and are excited to offer them the best quality rosehip oil on the market.\"\n\n\nThe company has a strong commitment to using only the finest ingredients and following ethical manufacturing processes. The rosehip oil is 100% pure and natural, and is free from harmful chemicals, synthetic fragrances, and preservatives.\n\n\n\"Our aim is to provide our customers with a product that is not only effective, but also safe and environmentally responsible,\" added Mr Lau.\n\n\nThe company's rosehip oil is available in a variety of sizes and is sold through the company's website and select retail locations in Australia.\n\n\nAbout XIAN YUHUI BIOTECHNOLOGY CO.,LTD\n\n\nXIAN YUHUI BIOTECHNOLOGY CO.,LTD is a leading producer of natural and organic skincare products, committed to using only the finest ingredients and ethical manufacturing processes. The company offers a range of products, including rosehip oil, that are designed to nourish and rejuvenate the skin.\n\n\nFor more information abou {id:6,img:"https://picsum.photos/id/1016/600/400",title:"Our Company Expands to Europe Market",date:"2023-11-08",desc:"Food-grade sealed barrels and small trial bottle options available.",content:"XIAN YUHUI BIOTECHNOLOGY CO.,LTD, has announced their expansion into the European market. With a growing demand for natural and high-quality products, the company aims to introduce their range of pure essential oils to consumers in Europe.\n\nXIAN YUHUI BIOTECHNOLOGY CO.,LTD, which has established a reputation for producing pure and authentic essential oils, will offer our products through various channels, including online and in select retail stores. The move into the European market is expected to increase the company's global reach and strengthen their position as a leading producer of essential oils.\n\nThe CEO of XIAN YUHUI BIOTECHNOLOGY CO.,LTD stated, “We are thrilled to be expanding our reach into the European market and bringing our pure essential oils to a new audience. Our products are made from the finest natural ingredients and are a reflection of our commitment to producing high-quality, authentic essential oils.”\n\nOur essential oils will be available in popular scents such as lavender, eucalyptus, and peppermint, and will be packaged in recyclable materials to align with the company's commitment to sustainability.\n\nThis expansion into the European market is a significant milestone for the company and a testament to their commitment to producing pure and authentic essential oils. The company looks forward to introducing their products to new customers and becoming a trusted source for essential oils in Europe."},

an market is great news for those looking for high-quality, natural skincare products. With their commitment to producing top-quality jojoba oil, and their focus on customer satisfaction, XIAN YUHUI BIOTECHNOLOGY is poised to be a leading provider of natural skincare products in Australia."},
{id:8,img:"https://picsum.photos/id/1018/600/400",title:"Our Company Expands Global Reach with Exportation of Neroli Oil to Yemen",date:"2025-01-22",desc:"More carrier oils now hold EU organic standard certificates.",content:"Our has announced the successful export of its high-quality neroli oil to Yemen. XIAN YUHUI BIOTECHNOLOGY CO.,LTD, known for its commitment to sustainability and ethical sourcing, is thrilled to bring its products to a wider international market.\n\n\nNeroli oil, extracted from the blossom of the bitter orange tree, is valued for its distinctive citrus fragrance and numerous health benefits. The company's neroli oil is steam distilled using only the finest quality flowers, ensuring a pure and potent product.\n\n\nThis latest expansion is part of our company's ongoing efforts to expand its reach and bring its products to new customers around the world. With its focus on quality and sustainability, our company is well-positioned to meet the growing demand for natural and environmentally-friendly products.\n\n\nThe CEO of the company stated, \"We are proud to be able to offer our neroli oil to customers in Yemen and beyond. This marks a significant step in our mission to make our products available to those who value natural and ethical alternatives. We look forward to continuing to expand our reach and bring the benefits of our products to people around the world.\"\n\n\nThe shipment of neroli oil to Yemen is set to arrive in the coming days and will be available for purchase at select retailers."},

// 点击侧边栏跳转
function goDetail(id) {
    window.location.href = "news-detail.html?id=" + id;
}

// 渲染侧边栏
function renderRecentNews() {
    const container = document.getElementById('recentNews');
    const list = allNews.slice(0, 4);
    let html = '';
    list.forEach(item => {
        html += `
        <div onclick="goDetail(${item.id})" class="border-l-4 border-custom-main pl-3 cursor-pointer hover:bg-gray-50 transition">
            <p class="text-xs text-gray-500">${item.date}</p>
            <p class="text-sm font-medium line-clamp-2">${item.title}</p>
        </div>`;
    });
    container.innerHTML = html;
}

// 获取当前新闻ID
function getNewsIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return parseInt(params.get('id'));
}

// 渲染详情
function renderNewsDetail() {
    const id = getNewsIdFromUrl();
    const news = allNews.find(item => item.id === id);
    if (!news) {
        document.getElementById('newsDetail').innerHTML = "<h1>News not found</h1>";
        return;
    }
    const html = `
        <h1 class="text-3xl font-bold text-custom-main mb-3">${news.title}</h1>
        <p class="text-gray-500 mb-8">${news.date}</p>
        <img src="${news.img}" class="w-full h-auto rounded-xl mb-8">
        <div class="whitespace-pre-line">${news.content}</div>
    `;
    document.getElementById('newsDetail').innerHTML = html;
}

// 渲染 上一篇 / 下一篇 —— 最终修复版
function renderPrevNext() {
    const currentId = getNewsIdFromUrl();
    const sortedNews = [...allNews].sort((a, b) => a.id - b.id);
    const currentIndex = sortedNews.findIndex(n => n.id === currentId);

    let prevItem = null;
    let nextItem = null;

    if (currentIndex > 0) {
        prevItem = sortedNews[currentIndex - 1];
    }
    if (currentIndex + 1 < sortedNews.length) {
        nextItem = sortedNews[currentIndex + 1];
    }

    let html = '';
    if (prevItem) {
        html += `<a href="news-detail.html?id=${prevItem.id}" class="px-5 py-2 bg-gray-100 hover:bg-gray-200 rounded transition">← Previous</a>`;
    }
    if (nextItem) {
        html += `<a href="news-detail.html?id=${nextItem.id}" class="px-5 py-2 bg-custom-main text-white hover:bg-opacity-90 rounded transition">Next →</a>`;
    }

    document.getElementById('prevNextContainer').innerHTML = html;
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    renderRecentNews();
    renderNewsDetail();
    renderPrevNext();
});
